name: m_finagent_mobile
description: Mobile financial copilot for MTN/Airtel MoMo in Rwanda.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2
  intl: ^0.19.0
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
